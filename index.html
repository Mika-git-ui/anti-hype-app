<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Anti-Hype Media Diet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>The Anti-Hype Media Diet</h1>
            <p>Defeat immediate internet hype. Save ideas now, review after a 7-day cooldown.</p>
        </header>

        <div class="form-container">
            <input type="text" id="media-input" placeholder="What caught your attention? (e.g., Cyberpunk 2077)">
            
            <select id="media-type">
                <option value="tv">📺 TV Show</option>
                <option value="movie">🎬 Movie</option>
                <option value="game">🎮 Video Game</option>
                <option value="book">📚 Book</option>
            </select>

            <select id="media-priority">
                <option value="low">🟡 Low Hype</option>
                <option value="high">🔴 Extreme Hype</option>
            </select>

            <button id="add-btn" class="btn-primary">Track Pulse</button>
        </div>

        <div class="dashboard">
            
            <div class="column">
                <h2>⏳ The Cooldown Chamber</h2>
                
                <div class="media-card">
                    <div class="card-header">
                        <span class="media-title">Squid Game Season 2</span>
                        <span class="badge badge-tv">TV Show</span>
                    </div>
                    <div class="text-muted" style="font-size: 0.85rem;">Remaining: 4 days, 12 hours</div>
                    <div class="countdown-bar">
                        <div class="progress-fill" style="width: 42%;"></div>
                    </div>
                </div>
            </div>

            <div class="column">
                <h2>⚡ The Decision Desk</h2>
                
                <div class="media-card">
                    <div class="card-header">
                        <span class="media-title">Elden Ring DLC</span>
                        <span class="badge badge-game">Video Game</span>
                    </div>
                    <div class="text-muted" style="font-size: 0.85rem; color: var(--accent-green);">✓ Unlocked (Cooldown complete)</div>
                    
                    <div class="card-actions">
                        <button class="btn-action btn-consume">Consume</button>
                        <button class="btn-action btn-trash">Drop Hype</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
