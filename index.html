<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Anti-Hype Media Diet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>The Anti-Hype Media Diet</h1>
            <p>Defeat immediate internet hype. Save ideas now, review after a cooldown.</p>
        </header>

        <div class="form-container">
            <input type="text" id="media-input" placeholder="What caught your attention? (e.g., Cyberpunk 2077)">
            
            <select id="media-type">
                <option value="tv">📺 TV Show</option>
                <option value="movie">🎬 Movie</option>
                <option value="game">🎮 Video Game</option>
                <option value="book">📚 Book</option>
            </select>

            <select id="media-priority">
                <option value="low">🟡 Low Hype</option>
                <option value="high">🔴 Extreme Hype</option>
            </select>

            <button id="add-btn" class="btn-primary">Track Pulse</button>
        </div>

        <div class="dashboard">
            
            <div class="column">
                <h2>⏳ The Cooldown Chamber</h2>
                <div id="locked-list">
                    </div>
            </div>

            <div class="column">
                <h2>⚡ The Decision Desk</h2>
                <div id="unlocked-list">
                    </div>
            </div>

        </div>
    </div>
    
    <script src="script.js"></script>

</body>
</html>
